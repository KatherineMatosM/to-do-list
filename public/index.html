<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app">

  <header class="header">
    <div class="header-left">
      <div class="header-icon">
        <i class="fas fa-check-double"></i>
      </div>
      <div>
        <div class="header-title">My Tasks</div>
        <div class="header-sub" id="date-label"></div>
      </div>
    </div>
    <div class="header-badge" id="top-badge">0 pendientes</div>
  </header>

  <div class="stats">
    <div class="stat stat-total">
      <div class="stat-num" id="s-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat stat-pend">
      <div class="stat-num" id="s-pend">0</div>
      <div class="stat-label">Pendientes</div>
    </div>
    <div class="stat stat-done">
      <div class="stat-num" id="s-done">0</div>
      <div class="stat-label">Completadas</div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-header-icon" style="background:#fce4ed">
        <i class="fas fa-plus" style="color:#EC326F"></i>
      </div>
      <span class="card-header-title">Nueva tarea</span>
    </div>
    <div class="card-body">
      <div class="form-stack">
        <div class="form-row">
          <input class="form-input" id="inp-title" placeholder="Nombre de la tarea..." autocomplete="off" />
          <button class="btn-add" id="btn-create" title="Agregar tarea">
            <i class="fas fa-plus"></i>
          </button>
        </div>
        <div class="form-row">
          <input class="form-input small" id="inp-desc" placeholder="Descripcion (opcional)" />
          <select class="form-select" id="inp-cat">
            <option value="work">Trabajo</option>
            <option value="personal">Personal</option>
            <option value="health">Salud</option>
            <option value="study">Estudio</option>
          </select>
          <select class="form-select" id="inp-pri">
            <option value="0">Alta</option>
            <option value="1">Media</option>
            <option value="2">Baja</option>
          </select>
          <input class="form-input" id="inp-due" type="date" />
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-header-icon" style="background:#e8f0fc">
        <i class="fas fa-filter" style="color:#1a4fa0"></i>
      </div>
      <span class="card-header-title">Filtrar tareas</span>
    </div>
    <div class="card-body" style="padding-top:10px;padding-bottom:12px">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="pending">Pendientes</button>
        <button class="filter-btn" data-filter="done">Completadas</button>
        <button class="filter-btn" data-filter="work">Trabajo</button>
        <button class="filter-btn" data-filter="personal">Personal</button>
        <button class="filter-btn" data-filter="health">Salud</button>
        <button class="filter-btn" data-filter="study">Estudio</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-header-icon" style="background:#e0f7f0">
        <i class="fas fa-list-ul" style="color:#0F6E56"></i>
      </div>
      <span class="card-header-title" id="list-label">Lista de tareas</span>
    </div>
    <div class="card-body" style="padding:10px 14px">
      <div class="tasks-list" id="tasks-list"></div>
    </div>

    <div class="progress-section">
      <div class="prog-row">
        <span style="display:flex;align-items:center;gap:5px">
          <i class="fas fa-clock" style="color:#EC326F; font-size:13px"></i>
          Progreso del dia
        </span>
        <span class="prog-pct" id="prog-pct">0%</span>
      </div>
      <div class="prog-bg">
        <div class="prog-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-header-icon">
        <i class="fas fa-pencil-alt"></i>
      </div>
      <div class="modal-title">Editar tarea</div>
    </div>

    <div class="modal-field">
      <label>Nombre</label>
      <input id="edit-title" type="text" placeholder="Nombre de la tarea" />
    </div>
    <div class="modal-field">
      <label>Descripcion</label>
      <textarea id="edit-desc" rows="2" placeholder="Descripcion opcional"></textarea>
    </div>
    <div class="modal-2col">
      <div class="modal-field">
        <label>Categoria</label>
        <select id="edit-cat">
          <option value="work">Trabajo</option>
          <option value="personal">Personal</option>
          <option value="health">Salud</option>
          <option value="study">Estudio</option>
        </select>
      </div>
      <div class="modal-field">
        <label>Prioridad</label>
        <select id="edit-pri">
          <option value="0">Alta</option>
          <option value="1">Media</option>
          <option value="2">Baja</option>
        </select>
      </div>
    </div>
    <div class="modal-field">
      <label>Fecha limite</label>
      <input id="edit-due" type="date" />
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel">Cancelar</button>
      <button class="btn-save" id="btn-save">Guardar cambios</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
</body>
</html>
